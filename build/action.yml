name: "Build and Push Docker Image"
description: "Builds and pushes a Docker image using poetry versioning and GHCR caching"

inputs:
  registry_user:
    description: "Registry username"
    required: true
  registry_password:
    description: "Registry password"
    required: true
  artifact:
    description: "Image build metadata artifact (e.g. image.json)"
    default: "image.json"
    required: true
  GITHUB_TOKEN:
    description: "GitHub token for authentication"
    required: true
  extra_index_url:
    description: "Extra PyPI index URL for internal packages (deprecated, use pypi_user/pypi_pass)"
    required: false
    default: ""
  pypi_user:
    description: "PyPI username for internal registry (e.g. _json_key_base64)"
    required: false
    default: ""
  pypi_pass:
    description: "PyPI password/token (base64-encoded for Google Artifact Registry)"
    required: false
    default: ""
  extra_build_args:
    description: "Additional Docker build-args (newline-separated KEY=VALUE pairs)"
    required: false
    default: ""
  npm_registry_token:
    description: "NPM registry auth token for @agent-ix scoped packages"
    required: false
    default: ""
  checkout:
    description: "Whether to checkout the repository before building"
    required: false
    default: "true"
  helm_chart_path:
    description: "Optional path to an app Helm chart to package and publish"
    required: false
    default: ""
  helm_chart_registry:
    description: "Registry host for OCI Helm chart publishing"
    required: false
    default: "ghcr.io"
  helm_chart_repository:
    description: "OCI repository path for Helm charts (e.g. agent-ix/charts)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4
      if: ${{ inputs.checkout != 'false' }}

    - uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact }}
        path: .

    - name: Load image metadata
      id: meta
      uses: agent-ix/docker-actions/load-metadata@main
      with:
        artifact: ${{ inputs.artifact }}

    - name: Test echo metadata
      shell: bash
      run: |
          echo "registry=${{ steps.meta.outputs.registry }}"
          echo "image=${{ steps.meta.outputs.image }}"
          echo "url=${{ steps.meta.outputs.url }}"
          echo "description=${{ steps.meta.outputs.description }}"
          echo "version=${{ steps.meta.outputs.version }}"
          echo "source=${{ steps.meta.outputs.source }}"
          echo "extra_urls=${{ steps.meta.outputs.extra_urls }}"

    - name: Create tags variable
      id: tags
      shell: bash
      run: |
        MAIN_TAG="${{ steps.meta.outputs.url }}"
        EXTRA_TAGS="${{ steps.meta.outputs.extra_urls }}"
        if [[ -z "$EXTRA_TAGS" || "$EXTRA_TAGS" == "null" ]]; then
          echo "tags=$MAIN_TAG" >> "$GITHUB_OUTPUT"
        else
          echo "tags=$MAIN_TAG,$EXTRA_TAGS" >> "$GITHUB_OUTPUT"
        fi

    - name: Docker login
      uses: docker/login-action@v3
      with:
        registry: ${{ steps.meta.outputs.registry }}
        username: ${{ inputs.registry_user }}
        password: ${{ inputs.registry_password }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.tags.outputs.tags }}
        cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache
        cache-to: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache,mode=max
        build-args: |
          BUILDKIT_INLINE_CACHE=1
          EXTRA_INDEX_URL=${{ inputs.extra_index_url }}
          ${{ inputs.extra_build_args }}
        secrets: |
          pypi_user=${{ inputs.pypi_user }}
          pypi_pass=${{ inputs.pypi_pass }}
          github_token=${{ inputs.GITHUB_TOKEN }}
          npm_token=${{ inputs.npm_registry_token }}
        labels: |
          org.opencontainers.image.source=${{ steps.meta.outputs.source }}
          org.opencontainers.image.description=${{ steps.meta.outputs.description }}
          org.opencontainers.image.version=${{ steps.meta.outputs.version }}

    - name: Print image summary
      uses: agent-ix/docker-actions/ghcr-docker-summary@main
      with:
        repository: ${{ steps.meta.outputs.repository }}
        tag: ${{ steps.meta.outputs.tag }}
        extra_tags: ${{ steps.meta.outputs.extra_tags }}
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}

    - name: Set up Helm
      if: ${{ inputs.helm_chart_path != '' }}
      uses: azure/setup-helm@v4

    - name: Validate Helm chart publish inputs
      if: ${{ inputs.helm_chart_path != '' }}
      shell: bash
      run: |
        if [[ -z "${{ inputs.helm_chart_repository }}" ]]; then
          echo "helm_chart_repository is required when helm_chart_path is set" >&2
          exit 1
        fi

    - name: Helm registry login
      if: ${{ inputs.helm_chart_path != '' }}
      shell: bash
      run: |
        echo "${{ inputs.registry_password }}" | helm registry login "${{ inputs.helm_chart_registry }}" \
          --username "${{ inputs.registry_user }}" \
          --password-stdin

    - name: Package and push Helm chart
      if: ${{ inputs.helm_chart_path != '' }}
      shell: bash
      env:
        CHART_PATH: ${{ inputs.helm_chart_path }}
        CHART_REGISTRY: ${{ inputs.helm_chart_registry }}
        CHART_REPOSITORY: ${{ inputs.helm_chart_repository }}
        CHART_VERSION: ${{ steps.meta.outputs.version }}
      run: |
        mkdir -p dist/charts
        helm dependency build "$CHART_PATH"
        helm package "$CHART_PATH" \
          --version "$CHART_VERSION" \
          --app-version "$CHART_VERSION" \
          --destination dist/charts
        CHART_PACKAGE=$(find dist/charts -maxdepth 1 -name '*.tgz' | head -n 1)
        if [[ -z "$CHART_PACKAGE" ]]; then
          echo "No packaged chart produced for $CHART_PATH" >&2
          exit 1
        fi
        helm push "$CHART_PACKAGE" "oci://$CHART_REGISTRY/$CHART_REPOSITORY"
        echo "### ⛵ Helm Chart Published" >> "$GITHUB_STEP_SUMMARY"
        echo "- Chart path: \`$CHART_PATH\`" >> "$GITHUB_STEP_SUMMARY"
        echo "- Version: \`$CHART_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
        echo "- OCI ref: \`oci://$CHART_REGISTRY/$CHART_REPOSITORY\`" >> "$GITHUB_STEP_SUMMARY"
