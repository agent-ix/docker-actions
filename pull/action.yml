name: "Pull Docker Image"
description: "Authenticates to the registry and pulls the image described in the image artifact"

inputs:
  artifact:
    description: "Name of the image metadata artifact"
    required: false
    default: "image.json"
  registry_user:
    description: "Registry username"
    required: true
  registry_password:
    description: "Registry password"
    required: true

outputs:
  registry:
    value: ${{ steps.meta.outputs.registry }}
  image:
    value: ${{ steps.meta.outputs.image }}
  url:
    value: ${{ steps.meta.outputs.url }}
  repository:
    value: ${{ steps.meta.outputs.repository }}
  tag:
    value: ${{ steps.meta.outputs.tag }}
  description:
    value: ${{ steps.meta.outputs.description }}
  source:
    value: ${{ steps.meta.outputs.source }}
  version:
    value: ${{ steps.meta.outputs.version }}

runs:
  using: "composite"
  steps:
    - name: Load image metadata
      id: meta
      uses: agent-ix/docker-actions/load-metadata@main
      with:
        artifact: ${{ inputs.artifact }}

    - name: Docker login
      uses: docker/login-action@v3
      with:
        registry: ${{ steps.meta.outputs.registry }}
        username: ${{ inputs.registry_user }}
        password: ${{ inputs.registry_password }}

    - name: Pull Docker image
      shell: bash
      run: |
        docker pull ${{ steps.meta.outputs.url }}

    - name: Tag image as latest
      shell: bash
      run: |
        set -euo pipefail

        SOURCE_IMAGE="${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}"
        TARGET_IMAGE="${{ steps.meta.outputs.image }}:latest"

        echo "🔄 Tagging $SOURCE_IMAGE -> $TARGET_IMAGE (local only)"
        docker tag "$SOURCE_IMAGE" "$TARGET_IMAGE"
