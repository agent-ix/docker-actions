name: "Pull Docker Image"
description: "Authenticates to the registry and pulls the image described in the image artifact"

inputs:
  artifact:
    description: "Name of the image metadata artifact"
    required: false
    default: "image.json"
  registry_user:
    description: "Registry username"
    required: true
  registry_password:
    description: "Registry password"
    required: true

runs:
  using: "composite"
  steps:
    - name: Load image metadata
      id: meta
      uses: agent-ix/docker-actions/load-metadata@main
      with:
        artifact: ${{ inputs.artifact }}

    - name: Docker login
      uses: docker/login-action@v3
      with:
        registry: ${{ steps.meta.outputs.registry }}
        username: ${{ inputs.registry_user }}
        password: ${{ inputs.registry_password }}

    - name: Pull Docker image
      shell: bash
      run: |
        docker pull ${{ steps.meta.outputs.url }}
