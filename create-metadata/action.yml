name: "Create Metadata"
description: "Generates standardized image.json metadata file and exposes all values as outputs"

inputs:
  registry:
    description: "Container registry"
    required: false
    default: "ghcr.io"
  GITHUB_TOKEN:
    description: "GitHub token for authentication"
    required: true
  repository:
    description: "Repository name (e.g. org/project). Defaults to github.repository"
    required: false
  tag_prefix:
    description: "Optional prefix for tag (e.g., dev, base)"
    required: false
  version:
    description: "Version or tag (e.g., v1.2.3)"
    required: true
  description:
    description: "Image description"
    required: true
  artifact:
    description: "Name of the output artifact"
    required: false
    default: "image.json"
  is_release:
    description: "Add latest tag to the image"
    required: false
    default: "false"

outputs:
  registry:
    value: ${{ steps.extract.outputs.registry }}
  repository:
    value: ${{ steps.extract.outputs.repository }}
  tag:
    value: ${{ steps.extract.outputs.tag }}
  image:
    value: ${{ steps.extract.outputs.image }}
  url:
    value: ${{ steps.extract.outputs.url }}
  description:
    value: ${{ steps.extract.outputs.description }}
  source:
    value: ${{ steps.extract.outputs.source }}
  version:
    value: ${{ steps.extract.outputs.version }}


runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Get Floating Tags
      id: floating_tags
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.GITHUB_TOKEN }}
      run: |
          # tags such as "latest", "main", "pr-<num>" that should be added
          # depending on context of the workflow.

          # Get the PR number if this is a pull request
          PR=$(gh pr list --state open --json number,headRefOid \
          --jq ".[] | select(.headRefOid == \"${{ github.sha }}\") | .number")
          echo "Found PR: $PR"
          echo "pr=$PR" >> "$GITHUB_OUTPUT"

          # if this is run on a commit with a tag, it should tag with that version tag.
          GIT_TAG=$(git tag --points-at HEAD)

          # if this is the main branch then it should tag unstable
          IS_MAIN_BRANCH=$(git rev-parse --abbrev-ref HEAD)

          # Improved handling using an array
          FLOATING_TAGS=()

          # Add `latest` tag if `is_release` is true
          if [[ "${{ inputs.is_release }}" == "true" ]]; then
              FLOATING_TAGS+=("latest")
          fi

          # Add Git tag if it exists
          if [[ -n "$GIT_TAG" ]]; then
              FLOATING_TAGS+=("$GIT_TAG")
          fi

          # Add PR tag if it exists
          if [[ -n "$PR" ]]; then
              FLOATING_TAGS+=("pr-$PR")
          fi

          # Add `unstable` tag if on the main branch
          if [[ "$IS_MAIN_BRANCH" == "main" ]]; then
              FLOATING_TAGS+=("unstable")
          fi

          # Join tags with commas
          FLOATING_TAGS=$(IFS=,; echo "${FLOATING_TAGS[*]}")

          echo "Floating tags: $FLOATING_TAGS"
          echo "floating_tags=$FLOATING_TAGS" >> "$GITHUB_OUTPUT"

    - name: Compute and write image.json
      id: meta
      shell: bash
      run: |
        REPO="${{ inputs.repository || github.repository }}"
        TAG="${{ inputs.tag_prefix }}${{ inputs.tag_prefix && '-' || '' }}${{ inputs.version }}"
        IMAGE="${{ inputs.registry }}/$REPO"
        URL="$IMAGE:$TAG"
        SOURCE="https://github.com/${{ github.repository }}"

        # convert floating tags to full urls
        FLOATING_URLS=()
        IFS=',' read -ra TAGS <<< "${{ steps.floating_tags.outputs.floating_tags }}"
        for TAG in "${TAGS[@]}"; do
          FLOATING_URLS+=("$IMAGE:$TAG")
        done

        # join floating urls with commas
        URLS=$(IFS=,; echo "${FLOATING_URLS[*]}")

        cat <<EOF > ${{ inputs.artifact }}
        {
          "registry": "${{ inputs.registry }}",
          "repository": "$REPO",
          "tag": "$TAG",
          "image": "$IMAGE",
          "url": "$URL",
          "description": "${{ inputs.description }}",
          "source": "$SOURCE",
          "version": "${{ inputs.version }}"
          "extra_urls": "$URLS",
        }
        EOF

        echo "Image metadata:"
        jq -r 'to_entries[] | "\(.key)=\(.value)"' "${{ inputs.artifact }}"

    - name: Export all fields as outputs
      id: extract
      shell: bash
      run: |
        jq -r 'to_entries[] | "\(.key)=\(.value)"' "${{ inputs.artifact }}" >> "$GITHUB_OUTPUT"

    - uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact }}
        path: ${{ inputs.artifact }}
